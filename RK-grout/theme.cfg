*.font:                               IosevkaTerm-6

# ───────────────────────────────────────┐
# Window options ####################### │
# ───────────────────────────────────────┘

# Textures have the following elements
# ---- Flat|Sunken|Raised
# ------- If Flat|Sunken, add Bevel1|Bevel2
# ---- Gradient|Solid
# -------- If Gradient, add: Horizontal|Vertical|Diagonal|Crossdiagonal|Pipecross|Elliptic|Rectangle|Pyramid
# ---- Interlaced
# ---- ParentRelative, for total transparency on parent element

window.bevelWidth:                     0
window.borderColor:                    #212a38
window.borderWidth:                    1
window.justify:                        center
# window.roundCorners:                 __{TopLeft,TopRight,BottomLeft,BottomRight}__

window.frame.focusColor:               #212a38
window.frame.unfocusColor:             #a0a0a7

window.handleWidth:                    12

# window.handle.focus:                 __texture__
# window.handle.focus.color:           __color__
# window.handle.focus.colorTo:         __color__
window.handle.focus.pixmap:            footer-inactive.xpm

# window.handle.unfocus:               __texture__
# window.handle.unfocus.color:         __color__
# window.handle.unfocus.colorTo:       __color__
window.handle.unfocus.pixmap:          footer.xpm

# window.grip.focus:                   __texture__
# window.grip.focus.color:             __color__
# window.grip.focus.colorTo:           __color__
window.grip.focus.pixmap:              grip-inactive.xpm

# window.grip.unfocus:                 __texture__
# window.grip.unfocus.color:           __color__
# window.grip.unfocus.colorTo:         __color__
window.grip.unfocus.pixmap:            grip.xpm

window.label.active:                   ParentRelative
window.label.active.textColor:         #222222

window.label.focus:                    ParentRelative
# window.label.focus.color:            __color__
# window.label.focus.colorTo:          __color__
window.label.focus.textColor:          #ffffff
# window.label.focus.pixmap:           __filename__

window.label.unfocus:                  ParentRelative
# window.label.unfocus.color:          __color__
# window.label.unfocus.colorTo:        __color__
window.label.unfocus.textColor:        #a0a0a7
# window.label.unfocus.pixmap:         __filename__

window.title.height:                   12

# window.title.focus:                  __texture__
# window.title.focus.color:            __color__
# window.title.focus.colorTo:          __color__
window.title.focus.pixmap:             grout-button1.blue.xpm

# window.title.unfocus:                __texture__
# window.title.unfocus.color:          __color__
# window.title.unfocus.colorTo:        __color__
window.title.unfocus.pixmap:           grout-button1.dark.xpm

# window.button.focus:                 __texture__
# window.button.focus.color:           __color__
# window.button.focus.colorTo:         __color__
# window.button.focus.picColor:        __color__
window.button.focus.pixmap:            grout-button1.orange.xpm

# window.button.pressed:               __texture__
# window.button.pressed.color:         __color__
# window.button.pressed.colorTo:       __color__
window.button.pressed.pixmap:          grout-button1.dark.xpm

# window.button.unfocus:               __texture__
# window.button.unfocus.color:         __color__
# window.button.unfocus.colorTo:       __color__
# window.button.unfocus.picColor:      __color__
window.button.unfocus.pixmap:          btn-icon.xpm

window.close.pixmap:                   grout-button1.red.xpm
window.close.pressed.pixmap:           grout-button1.dark.xpm
window.close.unfocus.pixmap:           grout-button1.dark.xpm

window.iconify.pixmap:                 grout-117.xpm
window.iconify.pressed.pixmap:         grout-118.xpm
window.iconify.unfocus.pixmap:         grout-119.xpm

window.maximize.pixmap:                .xpm
window.maximize.pressed.pixmap:        .xpm
window.maximize.unfocus.pixmap:        .xpm

window.shade:                          true
window.shade.pixmap:                   grout-97.xpm
window.shade.pressed.pixmap:           grout-97.xpm
window.shade.unfocus.pixmap:           grout-97.xpm

window.unshade.pixmap:                 .xpm
window.unshade.pressed.pixmap:         .xpm
window.unshade.unfocus.pixmap:         .xpm

window.stick.pixmap:                   .xpm
window.stick.pressed.pixmap:           .xpm
window.stick.unfocus.pixmap:           .xpm

window.stuck.pixmap:                   .xpm
window.stuck.pressed.pixmap:           .xpm
window.stuck.unfocus.pixmap:           .xpm

window.lhalf.pixmap:                   .xpm
window.lhalf.pressed.pixmap:           .xpm
window.lhalf.unfocus.pixmap:           .xpm

window.rhalf.pixmap:                   .xpm
window.rhalf.pressed.pixmap:           .xpm
window.rhalf.unfocus.pixmap:           .xpm

# ───────────────────────────────────────┐
# Menu options ######################### │
# ───────────────────────────────────────┘
menu.bevelWidth:                       0
menu.borderColor:                      #212a38
menu.borderWidth:                      1
menu.itemHeight:                       18
# menu.roundCorners:                   __{TopLeft,TopRight,BottomLeft,BottomRight}__

menu.bullet:                           triangle
menu.bullet.position:                  right

menu.frame:                            raised bevel1
menu.frame.color:                      #68686f
# menu.frame.colorTo:                  #a0a0a7
menu.frame.disableColor:               #a0a0a7
menu.frame.justify:                    left
menu.frame.textColor:                  #ffffff
#menu.frame.pixmap:                    __filename__

menu.hilite:                           flat gradient vertical
# menu.hilite.color:                   #999999
# menu.hilite.colorTo:                 #888888
menu.hilite.justify:                   left
menu.hilite.textColor:                 #ffffff
menu.hilite.pixmap:                    menu-hilite.xpm

menu.title:                            raised bevel1
menu.titleHeight:                      12
menu.title.color:                      #68686f
# menu.title.colorTo:                  __color__
menu.title.pixmap:                     titlebar-bg-inactive.xpm
menu.title.textColor:                  #ffffff
menu.title.justify:                    center

# menu.selected.pixmap:                __filename__
# menu.submenu.pixmap:                 __filename__
# menu.unselected.pixmap:              __filename__

# ───────────────────────────────────────┐
# Background ########################### │
# ───────────────────────────────────────┘

# See man fbsetroot for descriptions of the background options
# background: centered|aspect|tiled|fullscreen|random|solid|gradient __texture__|mod|none|unset background.pixmap:    __file or directory__
# background.color:                    __color__
# background.colorTo:                  __color__
# background.modX:                     __integer__
# background.modY:                     __integer__

# ───────────────────────────────────────┐
# Slit ################################# │
# ───────────────────────────────────────┘
slit:                                  flat raised bevel1
slit.bevelWidth:                       2
slit.borderColor:                      #212a38
slit.borderWidth:                      2
slit.color:                            #68686f
# slit.colorTo:                        __color__
# slit.pixmap:                         __filename__



# ───────────────────────────────────────┐
# Toolbar ############################## │
# ───────────────────────────────────────┘
toolbar:                               flat gradient vertical
toolbar.bevelWidth:                    0
toolbar.borderColor:                   #212a38
toolbar.borderWidth:                   0
# toolbar.button.scale:                1
# toolbar.color:                       __color__
# toolbar.colorTo:                     __color__
toolbar.pixmap:                        grout-toolbar.focus.xpm
toolbar.shaped:                        false
ioolbar.height:                        12

toolbar.clock:                         flat
toolbar.clock.borderColor:             #212a38
toolbar.clock.borderWidth:             1
toolbar.clock.justify:                 center
# toolbar.clock.color:                 __color__
# toolbar.clock.colorTo:               __color__
toolbar.clock.textColor:               #ffffff
toolbar.clock.pixmap:                  grout-toolbar.focus.xpm

toolbar.iconbar.borderColor:           #212a38
toolbar.iconbar.borderWidth:           0

toolbar.iconbar.empty:                 flat
# toolbar.iconbar.empty.color:         __color__
# toolbar.iconbar.empty.colorTo:       __color__
toolbar.iconbar.empty.pixmap:          grout-toolbar.focus.xpm

toolbar.iconbar.focused:               flat
# toolbar.iconbar.focused.color:       __color__
# toolbar.iconbar.focused.colorTo:     __color__
toolbar.iconbar.focused.borderColor:   #212a38
toolbar.iconbar.focused.borderWidth:   1
toolbar.iconbar.focused.justify:       center
toolbar.iconbar.focused.textColor:     #ffffff
toolbar.iconbar.focused.pixmap:        titlebar-bg-inactive.xpm

# toolbar.iconbar.unfocused:           __texture__
# toolbar.iconbar.unfocused.color:     __color__
# toolbar.iconbar.unfocused.colorTo:   __color__
toolbar.iconbar.unfocused.borderColor: #000000
toolbar.iconbar.unfocused.borderWidth: 1
toolbar.iconbar.unfocused.justify:     center
toolbar.iconbar.unfocused.textColor:   #a0a0a7
toolbar.iconbar.unfocused.pixmap:      titlebar-bg.xpm

#Rtoolbar.workspace:                   __texture__
toolbar.workspace.justify:             center
toolbar.workspace.textColor:           #ffffff
# toolbar.workspace.borderColor:       #000000
toolbar.workspace.borderWidth:         0
# toolbar.workspace.color:             __color__
# toolbar.workspace.colorTo:           __color__
toolbar.workspace.pixmap:              titlebar-bg.xpm

