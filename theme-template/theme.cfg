# ───────────────────────────────────────┐
# Window options ####################### │
# ───────────────────────────────────────┘

# Textures have the following elements
# ---- Flat|Sunken|Raised
# ------- If Flat|Sunken, add Bevel1|Bevel2
# ---- Gradient|Solid
# -------- If Gradient, add: Horizontal|Vertical|Diagonal|Crossdiagonal|Pipecross|Elliptic|Rectangle|Pyramid
# ---- Interlaced
# ---- ParentRelative, for total transparency on parent element

window.bevelWidth:                      0
window.borderColor:                     #cf752b
window.borderWidth:                     1
window.font:                            Kristen ITC-10
window.justify:                         center
window.roundCorners:                    TopLeft,BottomRight

window.frame.focusColor:                #ff8933
window.frame.unfocusColor:              #805821

window.handleWidth:                     4
window.handle.focus:                    flat solid
window.handle.focus.color:              #cf752b

window.handle.unfocus:                  flat solid
window.handle.unfocus.color:            #805821

window.grip.focus:                      flat solid
window.grip.focus.color:                #ff8933

window.grip.unfocus:                    flat solid
window.grip.unfocus.color:              #805821

window.label.active:                    ParentRelative
window.label.active.textColor:          #ffae70

window.label.focus:                     ParentRelative
# window.label.focus:                   sunken solid bevel1
window.label.focus.color:               #000000
# window.label.focus.colorTo:           __color__
#window.label.focus.textColor:           #ffffff
window.label.focus.pixmap:              demo-window.label.focus.xpm

window.label.unfocus:                   ParentRelative
# window.label.unfocus:                 sunken solid bevel1
window.label.borderWidth:               1
window.label.bevelWidth:                1
# window.label.unfocus.color:           __color__
# window.label.unfocus.colorTo:         __color__
window.label.unfocus.textColor:         #ffae70
window.label.unfocus.pixmap:            demo-window.label.unfocus.xpm

window.title.height:                    24
window.title.focus.pixmap:              demo-toolbar.title.focus.xpm
window.title.unfocus.pixmap:            demo-toolbar.title.unfocus.xpm

window.button.focus.pixmap:             demo-window.button.focus.xpm
window.button.pressed.pixmap:           demo-window.button.pressed.xpm
window.button.unfocus.pixmap:           demo-window.button.unfocus.xpm

window.close.pixmap:                    demo-window.close.xpm
window.close.pressed.pixmap:            demo-window.close.pressed.xpm
window.close.unfocus.pixmap:            demo-window.close.unfocus.xpm

window.iconify.pixmap:                  demo-window.iconify.xpm
window.iconify.pressed.pixmap:          demo-window.iconify.pressed.xpm
window.iconify.unfocus.pixmap:          demo-window.iconify.unfocus.xpm

window.maximize.pixmap:                 demo-window.maximize.xpm
window.maximize.pressed.pixmap:         demo-window.maximize.pressed.xpm
window.maximize.unfocus.pixmap:         demo-window.maximize.unfocus.xpm

window.shade:                           true
window.shade.pixmap:                    demo-window.shade.xpm
window.shade.pressed.pixmap:            demo-window.shade.pressed.xpm
window.shade.unfocus.pixmap:            demo-window.shade.unfocus.xpm

window.unshade.pixmap:                  demo-window.unshade.xpm
window.unshade.pressed.pixmap:          demo-window.unshade.pressed.xpm
window.unshade.unfocus.pixmap:          demo-window.unshade.unfocus.xpm

window.stick.pixmap:                    demo-window.stick.xpm
window.stick.pressed.pixmap:            demo-window.stick.pressed.xpm
window.stick.unfocus.pixmap:            demo-window.stick.unfocus.xpm

window.stuck.pixmap:                    demo-window.stuck.xpm
window.stuck.pressed.pixmap:            demo-window.stuck.pressed.xpm
window.stuck.unfocus.pixmap:            demo-window.stuck.unfocus.xpm

window.lhalf.pixmap:                    demo-window.lhalf.xpm
window.lhalf.unfocus.pixmap:            demo-window.lhalf.unfocus.xpm

window.rhalf.pixmap:                    demo-window.lhalf.xpm
window.rhalf.unfocus.pixmap:            demo-window.lhalf.unfocus.xpm

# ───────────────────────────────────────┐
# Menu options ######################### │
# ───────────────────────────────────────┘
menu.bevelWidth:                        0
menu.borderColor:                       #cf752b
menu.borderWidth:                       1
menu.itemHeight:                        24
menu.roundCorners:                      TopLeft,TopRight,BottomLeft,BottomRight

menu.bullet:                            triangle
menu.bullet.position:                   right

menu.frame:                             flat solid
menu.frame.color:                       #283540
menu.frame.disableColor:                #a0a0a7
menu.frame.font:                        Kristen ITC-10
menu.frame.justify:                     left
menu.frame.textColor:                   #eeeeee
menu.frame.pixmap:                      demo-menu.frame.xpm

menu.hilite.font:                       Kristen ITC-10:bold
menu.hilite.justify:                    left
menu.hilite.textColor:                  #ffffff
menu.hilite.pixmap:                     demo-menu.hilite.xpm

menu.titleHeight:                       24
menu.title.font:                        Kristen ITC-10:bold
menu.title.pixmap:                      demo-menu.title.xpm
menu.title.textColor:                   #ffffff
menu.title.justify:                     center

menu.selected.pixmap:                   demo-menu.selected.xpm
menu.submenu.pixmap:                    demo-menu.submenu.xpm
menu.unselected.pixmap:                 demo-menu.unselected.xpm

# ───────────────────────────────────────┐
# Background ########################### │
# ───────────────────────────────────────┘

# See man fbsetroot for descriptions of the background options
# background: centered|aspect|tiled|fullscreen|random|solid|gradient __texture__|mod|none|unset background.pixmap:  __file or directory__
# background.color:                     __color__
# background.colorTo:                   __color__
# background.modX:                      __integer__
# background.modY:                      __integer__

# ───────────────────────────────────────┐
# Slit ################################# │
# ───────────────────────────────────────┘
slit:                                   solid raised bevel1
slit.bevelWidth:                        1
slit.borderColor:                       #ff8933
slit.borderWidth:                       2
#slit.color:                            #cf752b
# slit.colorTo:                         __color__
slit.pixmap:                            demo-slit.xpm



# ───────────────────────────────────────┐
# Toolbar ############################## │
# ───────────────────────────────────────┘
toolbar:                                flat gradient vertical
toolbar.bevelWidth:                     0
toolbar.borderColor:                    #cf752b
toolbar.borderWidth:                    1
# toolbar.button.scale:                 1
# toolbar.color:                        __color__
# toolbar.colorTo:                      __color__
toolbar.pixmap:                         demo-toolbar.xpm
toolbar.shaped:                         true
toolbar.height:                         24

toolbar.clock:                          flat
toolbar.clock.borderColor:              #cf752b
toolbar.clock.borderWidth:              0
toolbar.clock.font:                     Kristen ITC-10
toolbar.clock.justify:                  center
# toolbar.clock.color:                  __color__
# toolbar.clock.colorTo:                __color__
toolbar.clock.textColor:                #ffffff
toolbar.clock.pixmap:                   demo-toolbar.clock.xpm

toolbar.iconbar.borderColor:            #cf752b
toolbar.iconbar.borderWidth:            0

toolbar.iconbar.empty:                  flat
# toolbar.iconbar.empty.color:          __color__
# toolbar.iconbar.empty.colorTo:        __color__
toolbar.iconbar.empty.pixmap:           demo-toolbar.iconbar.empty.xpm

toolbar.iconbar.focused:                flat
# toolbar.iconbar.focused.color:        __color__
# toolbar.iconbar.focused.colorTo:      __color__
toolbar.iconbar.focused.borderColor:    #cf752b
toolbar.iconbar.focused.borderWidth:    0
toolbar.iconbar.focused.font:           Kristen ITC-10:bold
toolbar.iconbar.focused.justify:        center
toolbar.iconbar.focused.textColor:      #ffffff
toolbar.iconbar.focused.pixmap:         demo-toolbar.iconbar.focused.xpm

# toolbar.iconbar.unfocused:            __texture__
# toolbar.iconbar.unfocused.color:      __color__
# toolbar.iconbar.unfocused.colorTo:    __color__
toolbar.iconbar.unfocused.borderColor:  #cf752b
toolbar.iconbar.unfocused.borderWidth:  0
toolbar.iconbar.unfocused.font:         Kristen ITC-10
toolbar.iconbar.unfocused.justify:      center
toolbar.iconbar.unfocused.textColor:    #283540
toolbar.iconbar.unfocused.pixmap:       demo-toolbar.iconbar.unfocused.xpm

#toolbar.workspace:                     __texture__
toolbar.workspace.font:                 Kristen ITC-10
toolbar.workspace.justify:              center
toolbar.workspace.textColor:            #ffffff
# toolbar.workspace.borderColor:        #000000
toolbar.workspace.borderWidth:          0
# toolbar.workspace.color:              __color__
# toolbar.workspace.colorTo:            __color__
toolbar.workspace.pixmap:               demo-toolbar.workspace.xpm
